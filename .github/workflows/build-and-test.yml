name: Build, Test & Export Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: "8.0.x"
  GODOT_VERSION: "4.6.1"
  GODOT_MONO: true
  PROJECT_PATH: src/SmartThings.Godot

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build .NET solution and run xUnit tests
  # ---------------------------------------------------------------------------
  build-and-test:
    name: Build .NET & Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore
        working-directory: src

      - name: Build solution (Release)
        run: dotnet build --no-restore --configuration Release
        working-directory: src

      - name: Run xUnit tests
        run: |
          dotnet test SmartThings.Tests/SmartThings.Tests.csproj \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./test-results \
            --verbosity normal
        working-directory: src

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: src/test-results/*.trx
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 2: Export Android APK using Godot 4.6.1 .NET (headless)
  # ---------------------------------------------------------------------------
  export-android:
    name: Export Android APK
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Setup Godot .NET
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: true
          include-templates: true

      - name: Setup Java 17 (Android SDK requirement)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Godot editor settings for Android
        run: |
          mkdir -p ~/.config/godot
          SETTINGS_FILE=~/.config/godot/editor_settings-4.tres
          echo '[gd_resource type="EditorSettings" format=3]' > "$SETTINGS_FILE"
          echo '' >> "$SETTINGS_FILE"
          echo '[resource]' >> "$SETTINGS_FILE"
          echo "export/android/android_sdk_path = \"$ANDROID_HOME\"" >> "$SETTINGS_FILE"
          echo "export/android/java_sdk_path = \"$JAVA_HOME\"" >> "$SETTINGS_FILE"

      - name: Verify Godot installation
        run: godot --version

      - name: Restore .NET dependencies
        run: dotnet restore
        working-directory: src

      - name: Build .NET project for Godot
        run: dotnet build --configuration Release
        working-directory: src

      - name: Generate Godot .NET glue
        run: godot --headless --path ${{ env.PROJECT_PATH }} --build-solutions --quit-after 30
        continue-on-error: true

      - name: Create export output directory
        run: mkdir -p build/android

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore build/android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt

      - name: Export Android APK
        run: |
          godot --headless \
            --path ${{ env.PROJECT_PATH }} \
            --export-debug "Android" \
            ../../build/android/SmartThings-Godot.apk
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: build/android/debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey

      - name: Verify APK was created
        run: |
          if [ ! -f build/android/SmartThings-Godot.apk ]; then
            echo "::error::APK export failed - file not found at build/android/SmartThings-Godot.apk"
            exit 1
          fi
          ls -lh build/android/SmartThings-Godot.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android/SmartThings-Godot.apk
          retention-days: 14
          if-no-files-found: error
